<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Upload Question Papers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="mb-4 text-center">Upload Question Papers</h2>

    <div th:if="${message}" class="alert alert-info" th:text="${message}"></div>

    <form th:action="@{/upload}" method="post" enctype="multipart/form-data">
        <div class="mb-3">
            <label for="courseName" class="form-label">Course Name</label>
            <input class="form-control" type="text" id="courseName" name="courseName" required />
        </div>
        <div class="mb-3">
            <label for="courseCode" class="form-label">Course Code</label>
            <input class="form-control" type="text" id="courseCode" name="courseCode" required />
        </div>
        <div class="mb-3">
            <label for="year" class="form-label">Year</label>
            <input class="form-control" type="text" id="year" name="year" required />
        </div>
        <div class="mb-3">
            <label for="pdfFiles" class="form-label">Select PDF files</label>
            <input class="form-control" type="file" id="pdfFiles" name="files" accept="application/pdf" multiple required />
        </div>
        <button type="submit" class="btn btn-primary">Upload</button>
    </form>
</div>
</body>
</html>
