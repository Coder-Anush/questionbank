<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Search Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow-lg rounded p-4">
        <h2 class="mb-4 text-center">Results</h2>

        <div th:if="${results.isEmpty()}" class="alert alert-warning">
            No matching papers found.
        </div>

        <ul class="list-group" th:each="file : ${results}">
            <li class="list-group-item d-flex justify-content-between align-items-center">
                <span th:text="${file}"></span>
                <div>
                    <a class="btn btn-sm btn-success me-2" th:href="@{'/papers/' + ${file}}" download>Download</a>
                    <a class="btn btn-sm btn-outline-primary" th:href="@{'/papers/' + ${file}}" target="_blank">View</a>
                </div>
            </li>
        </ul>

        <div class="text-center mt-4">
            <a href="/" class="btn btn-secondary">Back to Search</a>
        </div>
    </div>
</div>
</body>
</html>
